<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alatau City Invest - FAQ</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="faq">
  <div data-component="header"></div>

  <main class="page">
    <div class="container" style="max-width:980px">
      <div class="section-title">
        <h2>FAQ</h2>
        <p>Частые вопросы по инвестициям, верификации, модерации и юридическим процедурам.</p>
      </div>

      <section class="card" style="margin-bottom:16px">
        <div class="form-field">
          <label for="faqSearch">Поиск по FAQ</label>
          <input id="faqSearch" placeholder="Например: как проверить юридическую чистоту" />
        </div>
      </section>

      <section class="grid" id="faqList"></section>

      <section class="section card">
        <h3 class="card-title">Не нашли ответ?</h3>
        <p class="muted">Свяжитесь с нами через контакты или задайте вопрос AI-ассистенту.</p>
        <div class="plot-actions" style="margin-top:12px">
          <a class="btn btn-primary" href="contacts.html">Связаться с поддержкой</a>
          <a class="btn btn-ghost" href="ai-assistant.html">Открыть AI-ассистента</a>
        </div>
      </section>
    </div>
  </main>

  <div data-component="footer"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
